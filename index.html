<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                background-color: gray;
                text-align: center;
            }

            h1, h2, h3{
                color: black;
                font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            }

            p{
                font-size: 16px;
            }

            button{
                padding: 5px;
                width: 10%;
                margin: auto;
            }

            img{
                 width: 200px; 
                 height: 200px;
                 border-radius: 50%;

            .lista{
                background-color: rgb(161, 161, 161);

                text-align: left;
            }

            .card{

                width: 400px;
                border: 5px solid rgb(77, 234, 255);
                border-radius: 15px;
                padding: 10px;
                margin: 20px auto;
                text-align: justify;
            }

        <meta charset="UTF-8">
        <title>Victor Susko</title>
    </head>

    <body>

        <h1>Victor Susko</h1>
        <img src="https://github.com/VSusko.png" alt="Minha foto">
        <h2>Interesses:</h2>

        <div class="lista">
            <ul>
                <li>Programação</li>
                <li>Academia</li>
                <li>Jogos</li>
            </ul>
        </div>

        <div class="card">
            <h3 style="text-align: center"> Sobre mim</h3>
            <p>Sou estudante de Ciência da Computação na Universidade Federal de Ouro Preto.</p>
        </div>

        <button>Clique aqui</button>

</html>
